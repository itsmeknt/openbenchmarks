name: Fetch Google Sheet and deploy Pages

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Copy site files
        run: |
          mkdir -p site
          cp -R static/. site/
  
      - name: Fetch Google sheet and build JSON
        env:
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          SPREADSHEET_ID: "18vhVn6xqJnXVq3kQ3HCs__E58b3Ey_xTOUx5zO4rm0I"
          OUTPUT_PATH: "site/gsheet_data.json"
        run: python scripts/fetch_gsheet.py

      - name: Debug workspace
        shell: bash
        run: |
          echo "PWD:"
          pwd
          echo
          echo "Repository root:"
          ls -la
          echo
          tree .

      - name: Upload debug site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-debug
          path: ./site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
